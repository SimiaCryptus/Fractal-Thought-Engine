description: 'An unflinching institutional critique of Ohio''s interlocking systems of family law, public education, and moral-reform infrastructure — examined through the lived experience of a secular, adoptive single father in Westerville, where growth charts become weapons, schools sort children by salvation status, and 150 years of temperance-era machinery never stopped running.'
excerpt: 'Selective enforcement, institutional illegibility, and the moral-reform machinery that never stopped running. A single father dissects how Ohio''s civic architecture — from CPS to public schools saturated by released-time religious instruction — sorts families into protected, accommodated, and exposed, and what happens to the ones who fall through every category the system knows how to read.'
