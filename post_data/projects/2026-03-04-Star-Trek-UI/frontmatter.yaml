description: 'An analysis of why LLMs are confined to chat interfaces and a proposal for a spatial, tool-centric ''Cognitive Workspace'' inspired by Star Trek''s LCARS.'
excerpt: 'Virtually every large language model ships inside a chat window. This essay argues that this is a structural mistake—an ''inversion'' of how tools and language should interact—and looks to Star Trek''s LCARS for a better path forward: language for thinking, interfaces for doing.'
